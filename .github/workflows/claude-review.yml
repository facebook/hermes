name: Claude Review
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number
      model:
        description: Claude model to use
        required: false
        type: choice
        options:
          - claude-opus-4-6
          - claude-opus-4-1-20250805
          - claude-sonnet-4-20250514
          - claude-4-0-sonnet-20250805
        default: claude-opus-4-6

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR diff
        id: pr
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
              mediaType: { format: 'diff' }
            });
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr.diff', pr.data);

            const prInfo = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }}
            });
            core.setOutput('title', prInfo.data.title);
            core.setOutput('body', prInfo.data.body || '');

      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build prompt
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          Review this pull request diff. Provide a concise code review.
          Flag any bugs, security issues, or style problems.
          Format with Summary, Issues Found (critical/suggestion/nitpick), and Positive Observations.

          EOF
          printf 'PR Title: %s\n\n' "$PR_TITLE" >> /tmp/prompt.txt
          cat /tmp/pr.diff >> /tmp/prompt.txt

      - name: Run Claude review
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/prompt.txt
          claude_args: "--model ${{ inputs.model }} --max-turns 10 --allowedTools View,GlobTool,GrepTool"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Print review
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          echo "=== Claude Review for PR #${{ inputs.pr_number }} ==="
          jq -r '.[] | select(.type == "result") | .result // "No result"' "$EXECUTION_FILE"
