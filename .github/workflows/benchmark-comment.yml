name: Post Benchmark Results

# Runs after the Benchmarks workflow completes. Uses workflow_run so
# the GITHUB_TOKEN is scoped to the base repo and can write PR comments
# even when the PR comes from a fork.
on:
  workflow_run:
    workflows: ['Benchmarks']
    types: [completed]

jobs:
  comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Download benchmark results artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR number
        id: pr
        run: |
          if [ ! -f results/pr-number.txt ]; then
            echo "No PR number file found — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$(cat results/pr-number.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Read markdown report
        id: report
        if: steps.pr.outputs.skip != 'true'
        run: |
          if [ ! -f results/bench_report.md ]; then
            echo "No bench_report.md found — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.pr.outputs.skip != 'true' && steps.report.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- hermes-benchmark-results -->';
            const prNumber = parseInt('${{ steps.pr.outputs.number }}', 10);

            const markdown = fs.readFileSync('results/bench_report.md', 'utf-8');
            const body = `${marker}\n${markdown}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info('Created new comment');
            }
