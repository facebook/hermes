name: Perf Test on Raspberry Pi 5B

on:
  push:
    branches:
      - static_h
  pull_request:
    branches:
      - static_h
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to benchmark (defaults to current commit)'
        required: false
        type: string

env:
  BENCH_SHA: ${{ inputs.sha || github.sha }}

jobs:
  build:
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.author_association == 'OWNER'
    runs-on: ubuntu-24.04-arm
    container:
      image: arm64v8/debian:trixie
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y cmake ninja-build clang-19 build-essential libicu-dev zip python3 git
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BENCH_SHA }}
      - name: Build Release
        run: |
          export CC=clang-19
          export CXX=clang++-19
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target synth hermesc
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: hermes-bin
          path: |
            build/bin/synth
            build/bin/hermesc

  benchmark:
    needs: build
    runs-on: raspberrypi5-8gb
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: hermes-bin
          path: hermes-bin

      - name: Prepare binaries
        run: chmod +x hermes-bin/hermesc hermes-bin/synth

      - name: Compile benchmark to bytecode
        run: |
          hermes-bin/hermesc -O -w -emit-binary \
            -out synth-bench-simple/index.android.hbc \
            synth-bench-simple/index.android.bundle

      - name: Run synth benchmark
        run: |
          hermes-bin/synth \
            -reps 5 \
            synth-bench-simple/synth_trace.json \
            synth-bench-simple/index.android.hbc \
            2>synth_stderr.txt \
            | tee synth_raw_output.txt

      - name: Upload raw output
        uses: actions/upload-artifact@v4
        with:
          name: synth-raw-output
          path: synth_raw_output.txt

  analyze:
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BENCH_SHA }}
          sparse-checkout: .github/scripts

      - name: Download raw output
        uses: actions/download-artifact@v4
        with:
          name: synth-raw-output

      - name: Get commit timestamp
        id: commit-info
        run: |
          echo "timestamp=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Extract results
        run: |
          python3 .github/scripts/extract_synth_results.py \
            synth_raw_output.txt \
            "${{ env.BENCH_SHA }}" \
            "${{ steps.commit-info.outputs.timestamp }}" \
            | tee benchmark_results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ env.BENCH_SHA }}
          path: benchmark_results.json
