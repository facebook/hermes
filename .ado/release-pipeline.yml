#
# The Release pipeline entry point.
# It releases NuGet packages to the public ms/react-native ADO feed and to
# the NuGet.org feed.
#

name: Release $(Date:yyyyMMdd).$(Rev:r)

# The triggers are overridden by the ADO pipeline definitions.
trigger: none
pr: none

resources:
  pipelines:
  - pipeline: CI
    project: ISS
    source: microsoft.hermes-windows.ci
    trigger: none

  repositories:
  - repository: OfficePipelineTemplates
    type: git
    name: 1ESPipelineTemplates/OfficePipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      vmImage: windows-latest
      os: windows
    sdl:
      eslint:
        # This repo does not ship any JavaScript code. All JS/TS files are
        # test cases, benchmarks, or internal tools. Exclusions are in
        # .eslintignore at the repo root, so keep exclusions enabled.
        enableExclusions: true
      bandit:
        # This repo does not ship any Python code. All .py files are build
        # scripts, test utilities, benchmarks, or external tools (LLVM lit).
        enabled: false
      suppression:
        suppressionFile: $(Build.SourcesDirectory)\.ado\guardian\sdl\.gdnsuppress

    stages:
    - stage: nuget_publish
      displayName: Nuget publish

      jobs:
      - job: ms_react_native_nuget_job
        displayName: Publish Nuget to ms/react-native-public

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: CI
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - script: dir /S $(Pipeline.Workspace)\published-packages
          displayName: Show directory contents

        - task: AzureCLI@2
          displayName: Override NuGet credentials with Managed Identity
          inputs:
            azureSubscription: 'Office-Hermes-Windows-Bot'
            visibleAzLogin: false
            scriptType: 'pscore'
            scriptLocation: 'inlineScript'
            inlineScript: |
              $accessToken = az account get-access-token --query accessToken --resource 499b84ac-1321-427f-aa17-267ca6975798 -o tsv
              # Set the access token as a secret, so it doesn't get leaked in the logs
              Write-Host "##vso[task.setsecret]$accessToken"
              # Override the apitoken of the nuget service connection, for the duration of this stage
              Write-Host "##vso[task.setendpoint id=29e4c04c-ae69-4453-b9f3-bfef7a4c8d32;field=authParameter;key=apitoken]$accessToken"

        - task: 1ES.PublishNuGet@1
          displayName: NuGet push to ms/react-native-public
          inputs:
            useDotNetTask: true
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/Microsoft.JavaScript.Hermes.*.nupkg'
            nuGetFeedType: external
            publishFeedCredentials: 'Nuget - ms/react-native-public'
            externalEndpoint: 'Nuget - ms/react-native-public'
            publishPackageMetadata: true


      - job: nuget_org_job
        displayName: Publish NuGet to nuget.org

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: CI
            artifactName: published-packages
            targetPath: '$(Pipeline.Workspace)/published-packages'

        steps:
        - script: dir /S $(Pipeline.Workspace)\published-packages
          displayName: Show directory contents

        - task: AzureKeyVault@2
          inputs:
            azureSubscription: ESRP-JSHost3
            KeyVaultName: OGX-JSHost-KV
            SecretsFilter: 'OGX-JSHost-Nuget-org-API-key-Microsoft-JavaScript-NodeApi'

        - pwsh: |
            $nugetOrgApiKey = "$(OGX-JSHost-Nuget-org-API-key-Microsoft-JavaScript-NodeApi)"
            if ([string]::IsNullOrWhiteSpace($nugetOrgApiKey)) {
              throw "NuGet.org API key is missing or empty."
            }
            # Set the API key as a secret, so it doesn't get leaked in logs.
            Write-Host "##vso[task.setsecret]$nugetOrgApiKey"
            # 1ES.PublishNuGet (NuGetCommand path) reads NUGETKEY from
            # endpoint auth parameters for this external endpoint.
            Write-Host "##vso[task.setendpoint id=f15cbb2b-c0a8-4325-a866-960fa0bec9af;field=authParameter;key=nugetkey]$nugetOrgApiKey"
          displayName: Inject NuGet.org API key into endpoint

        - task: 1ES.PublishNuGet@1
          displayName: NuGet push to nuget.org
          inputs:
            # Keep this false: DotNetCoreCLI path does not work with this key
            # wiring for nuget.org in this pipeline.
            useDotNetTask: false
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/Microsoft.JavaScript.Hermes.*.nupkg'
            nuGetFeedType: external
            publishFeedCredentials: 'nuget.org/cxe/hermes-windows'
            externalEndpoint: 'nuget.org/cxe/hermes-windows'
            publishPackageMetadata: true
